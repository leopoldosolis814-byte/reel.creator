<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 Álbumes + Título + Fecha + Textos</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f5;
            padding: 16px;
            max-width: 600px;
            margin: auto;
            color: #1a1a1a;
        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .album-card {
            background: #fafafa;
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #e8e8e8;
        }
        .album-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .album-header input[type="text"] {
            flex: 1;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: bold;
            color: #1a1a1a;
            min-width: 120px;
        }
        .album-header input[type="text"]:focus {
            outline: none;
            border-color: #4A6CF7;
        }
        .album-header .fecha-label {
            font-size: 12px;
            color: #666;
        }
        .album-header input[type="date"] {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            color: #1a1a1a;
        }
        .album-header input[type="date"]:focus {
            outline: none;
            border-color: #4A6CF7;
        }
        .fecha-guardada {
            font-size: 12px;
            color: #4A6CF7;
            font-weight: bold;
        }
        .album-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 8px 0;
        }
        .album-item {
            position: relative;
            aspect-ratio: 1;
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
        }
        .album-item img,
        .album-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .album-item .btn-download-media {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            cursor: pointer;
        }
        .album-item .btn-delete-media {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(255, 0, 0, 0.7);
            border: none;
            color: #fff;
            font-size: 11px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
        }
        .btn-upload-small {
            background: #e8e8e8;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            margin-top: 6px;
        }
        .btn-upload-small:hover {
            border-color: #4A6CF7;
            color: #4A6CF7;
            background: #f0f0f0;
        }
        .empty-album {
            color: #aaa;
            text-align: center;
            padding: 15px 0;
            font-size: 12px;
        }
        .field {
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .field label {
            font-size: 11px;
            color: #666;
            min-width: 60px;
            font-weight: 600;
        }
        .field textarea {
            flex: 1;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
            color: #1a1a1a;
            font-size: 12px;
            resize: vertical;
            min-height: 28px;
            max-height: 60px;
            font-family: inherit;
        }
        .field textarea:focus {
            outline: none;
            border-color: #4A6CF7;
        }
        .field .btn-copy {
            background: #e8e8e8;
            border: none;
            color: #555;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .field .btn-copy:hover {
            background: #4A6CF7;
            color: #fff;
        }
        .separador {
            border-top: 1px solid #e8e8e8;
            margin: 8px 0 6px 0;
        }
        .btn-save-album {
            background: #4A6CF7;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            width: 100%;
        }
        .btn-save-album:hover {
            background: #3A56D4;
        }
        .btn-save-global {
            background: #4A6CF7;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-save-global:hover {
            background: #3A56D4;
        }
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4A6CF7;
            color: #fff;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(74, 108, 247, 0.3);
        }
    </style>
</head>
<body>

    <div id="albumesContainer"></div>

    <div class="card">
        <button class="btn-save-global" onclick="guardarTodo()">💾 Guardar Todo</button>
    </div>

    <div id="toast"></div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const ALBUMES = [
            { id: 'a1', label: 'Álbum 1' },
            { id: 'a2', label: 'Álbum 2' },
            { id: 'a3', label: 'Álbum 3' },
            { id: 'a4', label: 'Álbum 4' },
            { id: 'a5', label: 'Álbum 5' },
            { id: 'a6', label: 'Álbum 6' }
        ];

        // ============================================================
        // DATOS
        // ============================================================
        let data = { albums: {} };

        function initAlbumData() {
            ALBUMES.forEach(a => {
                data.albums[a.id] = {
                    titulo: '',
                    fecha: '',
                    media: [],
                    textos: { t1: '', t2: '', t3: '', t4: '', t5: '', copy: '' }
                };
            });
        }
        initAlbumData();

        // ============================================================
        // CARGAR / GUARDAR
        // ============================================================
        function load() {
            const saved = localStorage.getItem('app6v5');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Asegurar que todos los álbumes existen
                    ALBUMES.forEach(a => {
                        if (!parsed.albums[a.id]) {
                            parsed.albums[a.id] = { titulo: '', fecha: '', media: [], textos: { t1: '', t2: '',
                                    t3: '', t4: '', t5: '', copy: '' } };
                        }
                        if (!parsed.albums[a.id].textos) {
                            parsed.albums[a.id].textos = { t1: '', t2: '', t3: '', t4: '', t5: '', copy: '' };
                        }
                        if (!parsed.albums[a.id].titulo) parsed.albums[a.id].titulo = '';
                        if (!parsed.albums[a.id].fecha) parsed.albums[a.id].fecha = '';
                        if (!parsed.albums[a.id].media) parsed.albums[a.id].media = [];
                    });
                    data = parsed;
                } catch (e) {
                    initAlbumData();
                }
            } else {
                initAlbumData();
            }
            render();
        }

        function save() {
            ALBUMES.forEach(a => {
                const album = data.albums[a.id];
                // Título
                const tituloEl = document.getElementById(`titulo-${a.id}`);
                if (tituloEl) album.titulo = tituloEl.value;
                // Fecha
                const fechaEl = document.getElementById(`fecha-${a.id}`);
                if (fechaEl) album.fecha = fechaEl.value;
                // Textos
                for (let i = 1; i <= 5; i++) {
                    const el = document.getElementById(`t${i}-${a.id}`);
                    if (el) album.textos[`t${i}`] = el.value;
                }
                const copyEl = document.getElementById(`copy-${a.id}`);
                if (copyEl) album.textos.copy = copyEl.value;
            });
            localStorage.setItem('app6v5', JSON.stringify(data));
        }

        function guardarAlbum(albumId) {
            save();
            render();
            toast('✅ Álbum guardado');
        }

        function guardarTodo() {
            save();
            render();
            toast('✅ Todo guardado');
        }

        // ============================================================
        // RENDER
        // ============================================================
        function render() {
            const container = document.getElementById('albumesContainer');
            container.innerHTML = '';

            ALBUMES.forEach((album) => {
                const albumData = data.albums[album.id];
                if (!albumData) return;
                const items = albumData.media || [];
                const textos = albumData.textos || { t1: '', t2: '', t3: '', t4: '', t5: '', copy: '' };
                const titulo = albumData.titulo || '';
                const fecha = albumData.fecha || '';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="album-card">

                        <!-- HEADER -->
                        <div class="album-header">
                            <input type="text" id="titulo-${album.id}" placeholder="Título del álbum..." value="${titulo}">
                            <span class="fecha-label">📅</span>
                            <input type="date" id="fecha-${album.id}" value="${fecha}">
                            <span class="fecha-guardada" id="fechaMostrada-${album.id}">${fecha ? '✅' : ''}</span>
                        </div>

                        <!-- GRID -->
                        <div class="album-grid" id="grid-${album.id}">
                            ${items.length === 0 ? `<div class="empty-album">📭 Sin contenido</div>` : ''}
                            ${items.map((item, idx) => `
                                <div class="album-item">
                                    ${item.tipo === 'video' 
                                        ? `<video src="${item.data}" muted></video>` 
                                        : `<img src="${item.data}">`
                                    }
                                    <button class="btn-delete-media" onclick="eliminarMedia('${album.id}', ${idx})">✕</button>
                                    <button class="btn-download-media" onclick="descargarMedia('${album.id}', ${idx})">⬇️</button>
                                </div>
                            `).join('')}
                        </div>

                        <!-- SUBIR -->
                        <div class="btn-upload-small" onclick="subirMedia('${album.id}')">➕ Subir imagen o video</div>
                        <input type="file" id="file-${album.id}" accept="image/*,video/*" multiple style="display:none" onchange="procesarArchivos(event, '${album.id}')">

                        <!-- TEXTOS -->
                        <div style="margin-top:10px; border-top:1px solid #e8e8e8; padding-top:8px;">
                            ${[1,2,3,4,5].map(n => `
                                <div class="field">
                                    <label>T${n}</label>
                                    <textarea id="t${n}-${album.id}" placeholder="Texto ${n}...">${textos[`t${n}`] || ''}</textarea>
                                    <button class="btn-copy" onclick="copiarTexto('t${n}-${album.id}')">📋</button>
                                </div>
                            `).join('')}

                            <div class="separador"></div>

                            <div class="field">
                                <label>Copy</label>
                                <textarea id="copy-${album.id}" placeholder="Copy + hashtags...">${textos.copy || ''}</textarea>
                                <button class="btn-copy" onclick="copiarTexto('copy-${album.id}')">📋</button>
                            </div>
                        </div>

                        <!-- BOTÓN GUARDAR ÁLBUM -->
                        <button class="btn-save-album" onclick="guardarAlbum('${album.id}')">💾 Guardar Álbum</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // ============================================================
        // FUNCIONES ÁLBUM
        // ============================================================
        function subirMedia(albumId) {
            const input = document.getElementById(`file-${albumId}`);
            if (input) input.click();
        }

        function procesarArchivos(event, albumId) {
            const archivos = event.target.files;
            if (!archivos || archivos.length === 0) return;

            const album = data.albums[albumId];
            if (!album) return;

            let loaded = 0;
            for (let file of archivos) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    album.media.push({
                        tipo: file.type.startsWith('video') ? 'video' : 'imagen',
                        data: ev.target.result
                    });
                    loaded++;
                    if (loaded === archivos.length) {
                        save();
                        render();
                        toast('✅ ' + archivos.length + ' archivo(s) subido(s)');
                    }
                };
                reader.onerror = function() {
                    loaded++;
                    if (loaded === archivos.length) {
                        save();
                        render();
                        toast('⚠️ Algunos archivos fallaron');
                    }
                };
                reader.readAsDataURL(file);
            }
            event.target.value = '';
        }

        function eliminarMedia(albumId, index) {
            const album = data.albums[albumId];
            if (!album) return;
            album.media.splice(index, 1);
            save();
            render();
            toast('🗑️ Eliminado');
        }

        function descargarMedia(albumId, index) {
            const album = data.albums[albumId];
            if (!album) return;
            const item = album.media[index];
            if (!item) return;
            const link = document.createElement('a');
            link.href = item.data;
            const ext = item.tipo === 'video' ? 'mp4' : 'jpg';
            link.download = `media_${Date.now()}.${ext}`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            toast('⬇️ Descargando...');
        }

        // ============================================================
        // COPIAR TEXTO
        // ============================================================
        function copiarTexto(textId) {
            const el = document.getElementById(textId);
            if (!el) return;
            if (!el.value) {
                toast('⚠️ Vacío');
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(el.value).then(() => {
                    toast('📋 Copiado');
                }).catch(() => {
                    el.select();
                    document.execCommand('copy');
                    toast('📋 Copiado');
                });
            } else {
                el.select();
                document.execCommand('copy');
                toast('📋 Copiado');
            }
        }

        // ============================================================
        // TOAST
        // ============================================================
        function toast(msg) {
            const el = document.getElementById('toast');
            if (!el) return;
            el.textContent = msg;
            el.style.display = 'block';
            clearTimeout(el._t);
            el._t = setTimeout(() => {
                el.style.display = 'none';
            }, 2500);
        }

        // ============================================================
        // AUTO GUARDAR CADA 30 SEGUNDOS
        // ============================================================
        setInterval(() => {
            save();
        }, 30000);

        // ============================================================
        // INICIAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', load);
        // Si el DOM ya está cargado
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            load();
        }
    </script>

</body>
</html>
